version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Pin major-version bumps of peer dependencies behind a manual
      # review -- a better-auth major may break the plugin contract.
      - dependency-name: "better-auth"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@better-auth/core"
        update-types: ["version-update:semver-major"]
      # paseto-ts is the crypto primitive. Major bumps deserve manual
      # scrutiny for spec compliance, wire-format changes, and any
      # subtle behaviour that the test suite does not exercise. Minor
      # and patch updates still flow through.
      - dependency-name: "paseto-ts"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
