name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Library checks
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

      # Integration check: the example Hono app exercises the package
      # through Hono routing + real HTTP request/response shapes, and
      # cross-verifies a token against /paseto-keys with paseto-ts
      # directly to pin the JWKS interop story.
      - run: pnpm --filter better-auth-paseto-example-hono typecheck
      - run: pnpm --filter better-auth-paseto-example-hono test
