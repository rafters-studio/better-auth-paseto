name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches release.yml's Node 24.12 floor (npm 11.5+ required for
        # OIDC trusted publishing) and aligns with @types/node 25 in
        # devDeps. Older Node here typechecks against the newer @types
        # and surfaces API drift that does not exist in production.
        node: ["24", "25"]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          # Match the @rafters/mail repo. pnpm 11 made build-script
          # execution strict (ERR_PNPM_IGNORED_BUILDS even with
          # onlyBuiltDependencies set); pnpm 10.25 reads the same
          # lockfile + respects onlyBuiltDependencies without that
          # behaviour. Mail's CI is the canonical reference.
          version: 10.25.0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Library checks
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

      # Integration check: the example Hono app exercises the package
      # through Hono routing + real HTTP request/response shapes, and
      # cross-verifies a token against /paseto-keys with paseto-ts
      # directly to pin the JWKS interop story.
      - run: pnpm --filter better-auth-paseto-example-hono typecheck
      - run: pnpm --filter better-auth-paseto-example-hono test
